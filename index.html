<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA TATTOO | AGENDA</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fc-event { border: none !important; padding: 3px; font-weight: bold; }
        .fc-v-event { background-color: var(--fc-event-bg-color); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans">

    <!-- LOGIN -->
    <div id="login-screen" class="fixed inset-0 bg-zinc-950 flex items-center justify-center z-50">
        <div class="w-full max-w-xs p-8 bg-zinc-900 rounded-3xl border border-zinc-800 shadow-2xl">
            <h1 class="text-3xl font-black italic text-center mb-8 tracking-tighter">ESTÚDIO.</h1>
            <input type="password" id="pin-input" placeholder="SEU PIN" 
                class="w-full bg-zinc-800 border-none outline-none p-4 rounded-xl text-center text-2xl font-bold mb-4 focus:ring-2 focus:ring-white transition-all">
            <button onclick="login()" id="login-btn" class="w-full bg-white text-black p-4 rounded-xl font-black hover:bg-zinc-200 transition-all uppercase">Entrar</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="app" class="hidden min-h-screen">
        <header class="p-6 border-b border-zinc-800 flex justify-between items-center">
            <h2 class="font-black italic text-xl">STUDIO MANAGER</h2>
            <div class="flex items-center gap-4">
                <span id="user-display" class="text-xs font-bold bg-zinc-800 px-3 py-1 rounded-full"></span>
                <button onclick="logout()" class="text-xs text-zinc-500 hover:text-red-500 uppercase font-bold">Sair</button>
            </div>
        </header>

        <main class="p-4 max-w-6xl mx-auto">
            <div class="bg-zinc-900 p-4 rounded-2xl border border-zinc-800 overflow-hidden shadow-xl">
                <div id="calendar"></div>
            </div>
        </main>
    </div>

    <script>
        /** CONFIGURAÇÃO: COLE SUA URL ABAIXO **/
        const API_URL = "https://script.google.com/macros/s/AKfycbw1DUPJsEgVU5yhG0zsEBO9nil8OtciAc4aVnUSMEOdbWMeddfhYvU4LV7csrxnmgNdSA/exec"; 
        
        let currentUser = null;
        let calendar = null;

        async function login() {
            const pin = document.getElementById('pin-input').value;
            const btn = document.getElementById('login-btn');
            btn.innerText = "VALIDANDO...";

            try {
                const response = await fetch(`${API_URL}?action=getTatuadores`);
                const data = await response.json();

                // Garante que 'data' é uma array para evitar o erro .find
                const tatuadores = Array.isArray(data) ? data : [];
                const user = tatuadores.find(t => String(t.PIN) === String(pin));

                if (user) {
                    currentUser = user;
                    localStorage.setItem('tattoo_session', JSON.stringify(user));
                    showApp();
                } else {
                    alert("PIN incorreto ou erro no banco.");
                    btn.innerText = "ENTRAR";
                }
            } catch (e) {
                console.error(e);
                alert("Erro de conexão. Verifique se a URL do Script está correta.");
                btn.innerText = "ENTRAR";
            }
        }

        function showApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('user-display').innerText = currentUser.Nome.toUpperCase();
            renderCalendar();
        }

        function renderCalendar() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridDay',
                locale: 'pt-br',
                allDaySlot: false,
                slotMinTime: '09:00:00',
                slotMaxTime: '21:00:00',
                headerToolbar: { left: 'prev,next', center: 'title', right: 'timeGridDay,dayGridMonth' },
                selectable: true,
                events: `${API_URL}?action=getEvents`,
                
                select: async function(info) {
                    const bancada = prompt("Escolha a Bancada (1 a 4):");
                    if (["1", "2", "3", "4"].includes(bancada)) {
                        await fetch(API_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            body: JSON.stringify({
                                action: 'add',
                                tatuadorId: currentUser.ID,
                                bancada: bancada,
                                start: info.startStr,
                                end: info.endStr
                            })
                        });
                        setTimeout(() => calendar.refetchEvents(), 1000);
                    }
                },

                eventClick: async function(info) {
                    if (String(info.event.extendedProps.tatuadorId) === String(currentUser.ID)) {
                        if (confirm("Remover seu agendamento?")) {
                            await fetch(API_URL, {
                                method: 'POST',
                                mode: 'no-cors',
                                body: JSON.stringify({ action: 'delete', id: info.event.id })
                            });
                            setTimeout(() => calendar.refetchEvents(), 1000);
                        }
                    } else {
                        alert("Você não pode remover a agenda de outro tatuador.");
                    }
                }
            });
            calendar.render();
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        window.onload = () => {
            const session = localStorage.getItem('tattoo_session');
            if (session) {
                currentUser = JSON.parse(session);
                showApp();
            }
        };
    </script>
</body>
</html>
