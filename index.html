<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIO | Management System</title>
    
    <!-- Fontes e Frameworks -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F8F9FA] text-zinc-900">

    <!-- TELA DE LOGIN -->
    <div id="login-screen" class="fixed inset-0 bg-black flex items-center justify-center z-[200]">
        <div class="w-full max-w-sm px-6">
            <div class="text-center mb-12">
                <h1 class="text-6xl font-[900] tracking-tighter text-white italic">STUDIO.</h1>
                <p class="text-zinc-500 font-bold text-xs uppercase tracking-[0.3em] mt-2">Management Terminal</p>
            </div>
            <div class="bg-zinc-900 p-10 rounded-[2.5rem] border border-zinc-800 shadow-2xl">
                <input type="password" id="pin-input" placeholder="••••" 
                    class="w-full bg-zinc-800 border-none p-6 rounded-2xl text-center text-4xl font-black text-white mb-6 focus:ring-2 focus:ring-white transition-all placeholder:text-zinc-700">
                <button onclick="login()" id="login-btn" 
                    class="w-full bg-white text-black p-5 rounded-2xl font-black hover:scale-[1.02] active:scale-[0.98] transition-all uppercase tracking-widest">Acessar</button>
            </div>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="app" class="hidden min-h-screen flex flex-col lg:flex-row">
        
        <!-- SIDEBAR -->
        <aside class="w-full lg:w-[22rem] bg-white lg:h-screen lg:sticky lg:top-0 border-r border-zinc-100 p-8 flex flex-col overflow-y-auto no-scrollbar">
            <div class="flex justify-between items-start mb-12">
                <div>
                    <h2 class="text-3xl font-[900] italic leading-none tracking-tighter">STUDIO.</h2>
                    <span class="text-[0.6rem] font-bold text-zinc-400 uppercase tracking-widest">Operações Internas</span>
                </div>
                <button onclick="logout()" class="p-2 hover:bg-red-50 rounded-lg transition-colors group">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-zinc-400 group-hover:text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                </button>
            </div>

            <!-- PERFIL LOGADO -->
            <div class="mb-10 p-5 bg-zinc-900 rounded-3xl text-white shadow-xl flex items-center gap-4">
                <div id="user-photo-main" class="w-14 h-14 rounded-2xl bg-zinc-800 bg-cover bg-center border border-zinc-700"></div>
                <div>
                    <p class="text-[0.6rem] font-black text-zinc-500 uppercase tracking-widest">Tatuador Ativo</p>
                    <h3 id="user-name-main" class="font-bold text-lg leading-tight uppercase">---</h3>
                </div>
            </div>

            <div class="flex-grow">
                <h4 class="text-[0.6rem] font-black text-zinc-400 uppercase tracking-[0.2em] mb-6">Equipe</h4>
                <div id="team-list" class="space-y-4"></div>
            </div>
        </aside>

        <!-- ÁREA DO CALENDÁRIO -->
        <main class="flex-grow p-4 lg:p-10">
            <div class="bg-white rounded-[2rem] shadow-[0_20px_50px_rgba(0,0,0,0.04)] border border-zinc-100 overflow-hidden">
                <div id="calendar"></div>
            </div>
        </main>
    </div>

    <!-- Script Externo -->
    <script src="script.js"></script>
</body>
</html>
