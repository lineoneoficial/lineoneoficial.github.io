<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estúdio de Tatuagem - Gestão</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Login Overlay -->
    <div id="login-screen" class="fixed inset-0 bg-black flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-80 text-center">
            <h2 class="text-2xl font-bold mb-4">Acesso Tatuador</h2>
            <input type="password" id="pin-input" placeholder="Digite seu PIN" class="w-full p-2 border rounded mb-4 text-center text-xl">
            <button onclick="login()" class="bg-black text-white w-full py-2 rounded font-bold hover:bg-gray-800">Entrar</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-black uppercase tracking-tighter">Studio Manager</h1>
                <p id="welcome-msg" class="text-gray-500"></p>
            </div>
            <button onclick="logout()" class="text-sm text-red-500 underline">Sair</button>
        </header>

        <div class="bg-white p-4 rounded-xl shadow-sm">
            <div id="calendar"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw1DUPJsEgVU5yhG0zsEBO9nil8OtciAc4aVnUSMEOdbWMeddfhYvU4LV7csrxnmgNdSA/exec";
        let currentUser = null;
        let calendar = null;

async function login() {
    const pin = document.getElementById('pin-input').value;
    
    try {
        const res = await fetch(`${API_URL}?action=getTatuadores`);
        const data = await res.json();
        
        // DEBUG: Veja o que está chegando no console do navegador (F12)
        console.log("Dados recebidos:", data);

        // Garante que estamos lidando com uma array
        const tatuadores = Array.isArray(data) ? data : [];

        if (tatuadores.length === 0) {
            console.error("A lista de tatuadores está vazia ou o formato está incorreto.");
            alert("Erro ao carregar dados. Verifique o console.");
            return;
        }

        const user = tatuadores.find(t => String(t.PIN) === String(pin));

        if (user) {
            currentUser = user;
            localStorage.setItem('tatuador', JSON.stringify(user));
            document.getElementById('login-screen').classList.add('hidden');
            initCalendar();
        } else {
            alert("PIN incorreto");
        }
    } catch (error) {
        console.error("Erro na requisição:", error);
        alert("Não foi possível conectar ao servidor.");
    }
}

        function initCalendar() {
            document.getElementById('welcome-msg').innerText = `Bem-vindo, ${currentUser.Nome}`;
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridDay',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'timeGridDay,dayGridMonth' },
                locale: 'pt-br',
                slotMinTime: '09:00:00',
                slotMaxTime: '21:00:00',
                allDaySlot: false,
                selectable: true,
                events: `${API_URL}?action=getEvents`,
                select: async function(info) {
                    const bancada = prompt("Escolha a Bancada (1 a 4):");
                    if (["1","2","3","4"].includes(bancada)) {
                        await fetch(API_URL, {
                            method: 'POST',
                            body: JSON.stringify({
                                action: 'add',
                                tatuadorId: currentUser.ID,
                                bancada: bancada,
                                start: info.startStr,
                                end: info.endStr
                            })
                        });
                        calendar.refetchEvents();
                    }
                },
                eventClick: async function(info) {
                    if (info.event.extendedProps.tatuadorId == currentUser.ID) {
                        if (confirm("Deseja excluir este agendamento?")) {
                            await fetch(API_URL, {
                                method: 'POST',
                                body: JSON.stringify({ action: 'delete', id: info.event.id })
                            });
                            calendar.refetchEvents();
                        }
                    } else {
                        alert("Você só pode excluir suas próprias reservas.");
                    }
                }
            });
            calendar.render();
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        window.onload = () => {
            const saved = localStorage.getItem('tatuador');
            if (saved) {
                currentUser = JSON.parse(saved);
                document.getElementById('login-screen').classList.add('hidden');
                initCalendar();
            }
        };
    </script>
</body>
</html>
