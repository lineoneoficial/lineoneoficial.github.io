<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>STUDIO OS | Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F2F2F7] text-[#1C1C1E] antialiased">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="fixed inset-0 bg-[#F2F2F7] z-[500] flex flex-col items-center justify-center p-8 transition-all duration-500">
        <div class="w-full max-w-sm bg-white p-10 rounded-[3rem] shadow-xl text-center">
            <h1 class="text-3xl font-black italic mb-2">ST.</h1>
            <p class="text-gray-400 text-xs mb-10 font-bold uppercase tracking-widest">Acesso Terminal</p>
            <input type="password" id="pin-input" inputmode="numeric" placeholder="••••" 
                class="w-full bg-[#F2F2F7] border-none text-center text-4xl p-6 rounded-[2rem] focus:ring-2 focus:ring-black transition-all mb-4 font-bold tracking-widest">
            <button onclick="login()" id="login-btn" class="w-full bg-black text-white font-bold py-5 rounded-[2rem] active:scale-95 transition-all text-sm uppercase tracking-widest">Entrar</button>
        </div>
    </div>

    <!-- APP CONTAINER -->
    <div id="app" class="hidden min-h-screen pb-24 opacity-0 transition-opacity duration-700">
        <header class="p-8 pb-4 flex justify-between items-start">
            <div>
                <h2 class="text-zinc-400 text-[10px] font-bold uppercase tracking-widest mb-1" id="current-day-name">---</h2>
                <h3 class="text-3xl font-extrabold tracking-tighter" id="greeting-text">Olá.</h3>
            </div>
            <div id="user-avatar-top" class="w-14 h-14 rounded-2xl bg-white bg-cover bg-center shadow-md border-4 border-white"></div>
        </header>

        <main class="px-6">
            <section id="view-agenda" class="view-active">
                <div class="bg-white rounded-[3rem] p-4 shadow-sm border border-gray-100">
                    <div id="calendar"></div>
                </div>
            </section>
            <section id="view-team" class="hidden space-y-4 py-4"></section>
        </main>

        <nav class="fixed bottom-6 left-6 right-6 h-20 bg-white rounded-[2.5rem] shadow-2xl border border-gray-100 flex items-center justify-around px-10 z-[100]">
            <button onclick="switchView('agenda')" class="nav-btn active text-black">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10z"/></svg>
            </button>
            <button onclick="switchView('team')" class="nav-btn text-gray-200 hover:text-black">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            </button>
            <button onclick="logout()" class="text-red-200 hover:text-red-500">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7"/></svg>
            </button>
        </nav>
    </div>

<!-- MODAL DE BANCADA E CLIENTE -->
    <div id="modal-reserva" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[600] hidden items-end lg:items-center justify-center transition-all">
        <div class="bg-white w-full lg:w-[480px] rounded-t-[3.5rem] lg:rounded-[3rem] p-8 lg:p-10 shadow-2xl translate-y-full lg:translate-y-10 lg:scale-95 opacity-0 transition-all duration-400 ease-out" id="modal-sheet">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-8 lg:hidden"></div>
            
            <h4 class="text-2xl font-black italic tracking-tighter mb-6 text-center uppercase text-slate-800">Nova Reserva</h4>
            
            <!-- Formulário: Cliente e Horários -->
            <div class="space-y-4 mb-8">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2 px-1">Nome do Cliente</label>
                    <input type="text" id="cliente-nome" placeholder="Ex: João Silva" autocomplete="off"
                        class="w-full bg-slate-50 border border-slate-100 text-slate-800 p-4 rounded-2xl focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all font-bold outline-none placeholder:text-slate-300">
                </div>
                
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2 px-1">Início</label>
                        <input type="text" id="horario-inicio" disabled 
                            class="w-full bg-slate-100 border border-slate-100 text-slate-500 p-4 rounded-2xl font-bold text-xs outline-none text-center">
                    </div>
                    <div class="flex-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2 px-1">Fim</label>
                        <input type="text" id="horario-fim" disabled 
                            class="w-full bg-slate-100 border border-slate-100 text-slate-500 p-4 rounded-2xl font-bold text-xs outline-none text-center">
                    </div>
                </div>
            </div>

            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-3 text-center">Estação de Trabalho</label>
            <div class="grid grid-cols-2 gap-3 mb-8">
                <button onclick="setBancada(1)" class="b-btn active">Bancada 01</button>
                <button onclick="setBancada(2)" class="b-btn">Bancada 02</button>
                <button onclick="setBancada(3)" class="b-btn">Bancada 03</button>
                <button onclick="setBancada(4)" class="b-btn">Bancada 04</button>
            </div>

            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-500 p-5 rounded-[2rem] font-bold text-[10px] uppercase tracking-widest active:scale-95 hover:bg-slate-200 transition-all">Cancelar</button>
                <button onclick="confirmarReserva()" class="flex-[2] bg-indigo-600 text-white p-5 rounded-[2rem] font-black text-[10px] uppercase tracking-widest shadow-lg shadow-indigo-200 active:scale-95 hover:bg-indigo-700 transition-all">Confirmar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
